{% extends "base.html" %}

{% block content %}
<div class="container text-center error-page">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p class="lead">The page you are looking for does not exist or has been moved.</p>
            <p>Please check the URL or return to the home page.</p>
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go to Home</a>
        </div>
    </div>
</div>
{% endblock %}
